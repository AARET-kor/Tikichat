<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Concierge OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-brand-50: #eff4ff;
      --color-brand-100: #dce8ff;
      --color-brand-500: #45638c;
      --color-brand-700: #1f3656;
      --color-brand-800: #17283f;
      --color-brand-900: #101b2d;
      --font-sans: "Manrope", sans-serif;
      --shadow-panel: 0 14px 34px rgba(15, 23, 42, 0.08);
      --shadow-float: 0 18px 38px rgba(15, 23, 42, 0.12);
    }

    body {
      background: #f8fafc;
      color: #0f172a;
    }

    .grid-shell {
      display: grid;
      grid-template-columns: 78px minmax(320px, 30%) minmax(520px, 45%) minmax(300px, 25%);
    }

    .soft-scrollbar::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .soft-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.35);
      border-radius: 999px;
    }

    .chat-backdrop {
      background-image:
        radial-gradient(circle at top right, rgba(69, 99, 140, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(248, 250, 252, 0.98));
    }

    .ai-ring {
      background:
        linear-gradient(#ffffff, #ffffff) padding-box,
        linear-gradient(135deg, rgba(69, 99, 140, 0.45), rgba(124, 58, 237, 0.18), rgba(59, 130, 246, 0.3)) border-box;
      border: 1px solid transparent;
    }

    .timeline-line {
      background-image: linear-gradient(to bottom, rgba(148, 163, 184, 0.55) 60%, rgba(255, 255, 255, 0) 0%);
      background-position: left;
      background-size: 1px 10px;
      background-repeat: repeat-y;
    }
  </style>
</head>
<body class="min-h-screen font-sans antialiased">
  <div id="root"></div>
  <script type="module" src="/staff-app/main.js"></script>
</body>
</html>
